name: Deploy Frontend

on:
  push:
     branches:
     - main
  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

     # Step 3: Install npm dependencies
    - name: Install dependencies
      run: npm install
      working-directory: ./application-code/app-tier
        
    - name: Build Frontend
      run: |
        cd application-code/app-tier
        npm run build
