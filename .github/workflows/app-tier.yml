# .github/workflows/frontend-deploy.yml
name: Deploy Frontend

on:
  push:
    paths:
      - "application-code/app-tier/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        cd application-code/app-tier
        npm install

    - name: Build Frontend
      run: |
        cd application-code/app-tier
        npm run build
